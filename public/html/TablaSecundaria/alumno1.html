<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Alumno 1</title>
    <link rel="stylesheet" href="../../css/estilos.css">
    <script src="../../js/script.js" defer></script>
</head>
<body>
    <div class="Paneles">
        <div class="dashboard">
            <h1>Panel del Administrador — Alumno 1</h1>
        </div>
        <div class="cuerpo">
            <div class="sideMenu">
                <a href="#">Alumnos</a>
                <a href="#">Empresas</a>
                <a href="#">Aprobación de vacantes</a>
                <hr>
                <a href="#">Alumnos en empresas</a>
                <hr>
                <button onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
            <div class="contenido">
                <div class="tabla-contenedor">
                    <table>
                        <thead>
                            <tr>
                                <th>Documento</th>
                                <th>Estado</th>
                                <th>Aprobación</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Registro</td>
                                <td><span class="badge badge-aprobado">Aprobado</span></td>
                                <td>
                                    <button class="btn-aceptar" type="button">Aceptar</button>
                                    <button class="btn-rechazar" type="button">Rechazar</button>
                                </td>
                            </tr>
                            <tr>
                                <td><a href="">Carta compromiso</a></td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td>
                                    <button class="btn-aceptar" type="button">Aceptar</button>
                                    <button class="btn-rechazar" type="button">Rechazar</button>
                                </td>
                            </tr>
                            <tr>
                                <td><a href="">Carta presentación</a></td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td>
                                    <button class="btn-aceptar" type="button">Aceptar</button>
                                    <button class="btn-rechazar" type="button">Rechazar</button>
                                </td>
                            </tr>
                            <tr>
                                <td><a href="">Evaluación de unidad receptora</a></td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td>
                                    <button class="btn-aceptar" type="button">Aceptar</button>
                                    <button class="btn-rechazar" type="button">Rechazar</button>
                                </td>
                            </tr>
                            <tr>
                                <td><a href="">Carta de término</a></td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td>
                                    <button class="btn-aceptar" type="button">Aceptar</button>
                                    <button class="btn-rechazar" type="button">Rechazar</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <br>
                <button class="btn-subir" type="button" onclick="returnToDashboard()">← Regresar</button>
            </div>
        </div>
    </div>
</body>
</html>
