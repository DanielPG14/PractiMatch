<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../js/script.js" defer></script>
</head>  
<body>
    <div id="fondo">
        <div class="ventanaM">
            <div class="titulos">
                <h1>Bienvenido</h1>
            </div>

            <div class="tabs">
                <div class="tabs-contenedor">
                    <button class="tab activo" onclick="mostrarTab('login')">Iniciar sesión</button>
                    <button class="tab" onclick="mostrarTab('registro')">Registrarse</button>
                </div>
            </div>

            <div id="form-login">
                <form action="/login" method="post">
                    <div class="campo">
                        <label for="correo">Correo</label>
                        <input type="email" id="correo" name="correo" required>
                    </div>
                    <div class="campo">
                        <label for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" name="contrasena" required>
                    </div>
                    <button type="button" onclick="iniciarSesion()">Iniciar sesión</button>
                </form>
            </div>

            <div id="form-registro" style="display:none">
                <form action="/registro" method="post">
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="campo">
                        <label for="correo-reg">Correo</label>
                        <input type="email" id="correo-reg" name="correo" required>
                    </div>
                    <div class="campo">
                        <label for="contrasena-reg">Contraseña</label>
                        <input type="password" id="contrasena-reg" name="contrasena" required>
                    </div>
                    <div class="campo">
                        <label for="rol">Tipo de cuenta</label>
                        <select id="rol" name="rol">
                            <option value="estudiante">Estudiante</option>
                            <option value="empresa">Empresa</option>
                        </select>
                    </div>
                    <button type="button" onclick="registrar()">Registrarse</button>
                </form>
            </div>
        </div>     
    </div>
</body>
</html>
