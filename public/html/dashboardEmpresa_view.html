<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <div class="Paneles">
        <div class="dashboard">
            <h1>Panel de la Empresa</h1>
        </div>
        <div class="cuerpo">
            <div class="sideMenu">
                <a href="#" data-section="requisitos">Publicar</a>
                <a href="#" data-section="solicitudes">Solicitudes</a>
                <a href="#" data-section="becarios">Becarios</a>
                <hr>
                <a href="#" onclick="abrirModalPerfil()">
                    <i class="fas fa-user"></i> Perfil
                </a>
                <a href="#">Mural de vacantes</a>
                <hr>
                <button onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
            <div class="contenido">
                <div id="content-area"></div>
            </div>
        </div>
    </div>
</body>

// Modal para editar perfil de empresa

<div id="modal-perfil" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="close-btn" onclick="cerrarModalPerfil()">&times;</span>
        <h2>Perfil de Empresa</h2>
        <hr>
        <form id="form-perfil-empresa">
            <div class="form-group">
                <label>Nombre de la Empresa</label>
                <input type="text" id="perfil-nombre" name="nombre_empresa" disabled required>
            </div>
            
            <div class="form-group">
                <label>RFC</label>
                <input type="text" id="perfil-rfc" name="rfc" disabled required>
            </div>

            <div class="form-group">
                <label>Estado de Registro</label>
                <span id="perfil-estado" class="badge"></span>
            </div>

            <div class="modal-footer">
                <button type="button" id="btn-editar-activar" onclick="habilitarEdicion()" class="btn-secundario">Editar Datos</button>
                <button type="submit" id="btn-guardar-perfil" class="btn-primario" style="display:none;">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
