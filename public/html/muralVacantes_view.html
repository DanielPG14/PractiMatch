<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Vacantes</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <div class="Paneles">
        <div class="dashboard">
            <h1>Mural de Vacantes</h1>
        </div>
        <div class="cuerpo">
            <div class="sideMenu">
                <a href="#">Servicio</a>
                <a href="#">Integrativa</a>
                <a href="#">Prácticas</a>
                <hr>
                <a href="#">Documentos iniciales</a>
                <a href="#">Perfil</a>
                <a href="#" class="activo">Vacantes</a>
                <hr>
                <button onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
            <div class="contenido">
                <div class="tabla-contenedor">
                    <table>
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>Tipo de proceso</th>
                                <th>Descripción</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-vacantes">
                            <!-- JS llena esta tabla automáticamente -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
