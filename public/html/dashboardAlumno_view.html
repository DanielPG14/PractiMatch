<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumno</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <div class="Paneles">
        <div class="dashboard">
            <h1>Panel del Alumno</h1>
        </div>
        <div class="cuerpo">
            <div class="sideMenu">
                <a href="#" data-section="servicio">Servicio Social</a>
                <a href="#" data-section="integrativa">Integrativa Profesional</a>
                <a href="#" data-section="practicas">Prácticas Profesionales</a>
                <hr>
                <a href="#" data-section="documentos">Documentos Iniciales</a>
                <a href="#" data-section="perfil">Perfil</a>
                <a href="#" data-section="vacantes">Vacantes</a>
                <hr>
                <button onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
            <div class="contenido">
                <div id="content-area"></div>
            </div>
        </div>
    </div>

    <!-- MODAL DE PERFIL DEL ALUMNO -->
    <div id="modal-perfil-alumno" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModalPerfilAlumno()">&times;</span>
            <h2>Mi Perfil</h2>
            <hr>
            <form id="form-perfil-alumno">
                <div class="form-group">
                    <label>ID Estudiante</label>
                    <input type="text" id="perfil-id-estudiante" disabled>
                </div>
                <div class="form-group">
                    <label>Matrícula</label>
                    <input type="text" id="perfil-matricula" disabled>
                </div>
                <div class="form-group">
                    <label>Carrera</label>
                    <input type="text" id="perfil-carrera" disabled>
                </div>
                <div class="form-group">
                    <label>Correo</label>
                    <input type="text" id="perfil-correo" disabled>
                </div>
                <div class="form-group">
                    <label>RFC</label>
                    <input type="text" id="perfil-rfc" disabled>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secundario" onclick="cerrarModalPerfilAlumno()">Cancelar</button>
                    <button type="button" class="btn-primario" id="btn-editar-perfil-alumno" onclick="habilitarEdicionPerfilAlumno()">Editar</button>
                    <button type="submit" class="btn-primario" id="btn-guardar-perfil-alumno" style="display: none;">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
