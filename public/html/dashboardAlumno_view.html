<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumno</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <div class="Paneles">
        <div class="dashboard">
            <h1>Panel del Alumno</h1>
        </div>
        <div class="cuerpo">
            <div class="sideMenu">
                <a href="#">Servicio</a>
                <a href="#">Integrativa</a>
                <a href="#">Prácticas</a>
                <hr>
                <a href="#">Documentos iniciales</a>
                <a href="#">Perfil</a>
                <a href="#">Vacantes</a>
                <hr>
                <button onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
            <div class="contenido">
                <div class="tabla-contenedor">
                    <table>
                        <thead>
                            <tr>
                                <th>Documento</th>
                                <th>Estado</th>
                                <th>Subir</th>
                            </tr>
                        </thead>
                        <tbody id="tablaDocumentos">
                            <tr>
                                <td>INE</td>
                                <td><span class="badge badge-aprobado">Aprobado</span></td>
                                <td><button class="btn-subir" type="button">Subir</button></td>
                            </tr>
                            <tr>
                                <td>CURP</td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td><button class="btn-subir" type="button">Subir</button></td>
                            </tr>
                            <tr>
                                <td>Comprobante de domicilio</td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td><button class="btn-subir" type="button">Subir</button></td>
                            </tr>
                            <tr>
                                <td>Vigencia de seguro facultativo</td>
                                <td><span class="badge badge-pendiente">Pendiente</span></td>
                                <td><button class="btn-subir" type="button">Subir</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/alumno.js"></script>
</body>
</html>
