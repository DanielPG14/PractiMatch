<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PractiMatch | Alumno</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <!-- Scripts Modulares -->
    <script src="../js/core/utils.js" defer></script>
    <script src="../js/core/auth.js" defer></script>
    <script src="../js/modules/alumno.js" defer></script>
</head>

<body>
    <div class="Paneles">
        <div class="dashboard">
            <h1>Panel del Alumno</h1>
        </div>

        <div class="cuerpo">
            <div class="sideMenu">
                <a data-section="servicio" data-requires-validation="true">Servicio Social</a>
                <a data-section="integrativa" data-requires-validation="true">Integrativa Profesional</a>
                <a data-section="practicas" data-requires-validation="true">Prácticas Profesionales</a>
                <hr>
                <a href="#" data-section="documentos">Documentos</a>
                <a href="#" data-section="perfil">Perfil</a>
                <a href="#" data-section="vacantes">Vacantes</a>
                <hr>
                <button onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
            <div class="contenido">
                <div id="content-area"></div>
            </div>
        </div>
    </div>

    <!-- Modal Selección Proceso -->
    <div id="modal-seleccion-proceso" class="modal-overlay" style="display: none; z-index: 9999;">
        <div class="modal-content" style="text-align: center; max-width: 450px;">
            <h2>Bienvenido al Sistema</h2>
            <p>Selecciona el proceso académico que vas a cursar. <strong>Esta acción no se puede deshacer.</strong></p>
            <hr>
            <form id="form-seleccion-proceso" onsubmit="guardarProcesoInicial(event)">
                <div class="form-group" style="margin: 20px 0; text-align: left;">
                    <label for="select-proceso" style="font-weight: bold; display: block; margin-bottom: 8px;">Tipo de
                        Proceso:</label>
                    <select id="select-proceso" required style="width: 100%; padding: 10px; border-radius: 4px;">
                        <option value="" disabled selected>-- Selecciona una opción --</option>
                        <option value="Servicio">Servicio Social</option>
                        <option value="Práctica">Prácticas Profesionales</option>
                        <option value="Integrativa">Integrativa Profesional</option>
                    </select>
                </div>
                <div class="modal-footer" style="justify-content: center;">
                    <button type="submit" class="btn-primario" style="width: 100%; padding: 12px;">Confirmar
                        Selección</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Perfil Alumno -->
    <div id="modal-perfil-alumno" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModalPerfilAlumno()">&times;</span>
            <h2>Mi Perfil</h2>
            <hr>
            <form id="form-perfil-alumno">
                <div class="form-group"><label>Matrícula</label><input type="text" id="perfil-matricula" disabled></div>
                <div class="form-group"><label>Carrera</label><input type="text" id="perfil-carrera" disabled></div>
                <div class="form-group"><label>Correo</label><input type="text" id="perfil-correo" disabled></div>
                <div class="form-group"><label>Nombre</label><input type="text" id="perfil-nombre" disabled></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secundario" onclick="cerrarModalPerfilAlumno()">Cancelar</button>
                    <button type="button" class="btn-primario" id="btn-editar-perfil-alumno"
                        onclick="habilitarEdicionPerfilAlumno()">Editar</button>
                    <button type="submit" class="btn-primario" id="btn-guardar-perfil-alumno"
                        style="display: none;">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <input type="file" id="input-archivo-global" accept=".pdf,.png,.jpg,.jpeg" style="display: none;"
        onchange="procesarArchivoSeleccionado(this)">
    <input type="hidden" id="nombre-documento-temporal">
</body>

</html>
